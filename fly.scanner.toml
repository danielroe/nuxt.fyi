# Screenshot service. Called by the daemon over Fly private networking (`.internal`
# 6PN); no public ingress.

app = "nuxt-fyi-scanner"
primary_region = "lhr"

[build]
  dockerfile = "services/scanner/Dockerfile"

[deploy]
  strategy = "immediate"
  wait_timeout = "5m"
  min_machines_running = 1

[env]
  NODE_ENV = "production"
  PORT = "3000"
  HOST = "::"
  IMAGEKIT_ROOT_FOLDER = "/nuxt-fyi"
  IMAGEKIT_URL_ENDPOINT = "https://ik.imagekit.io/roe"
  # NSFW classification thresholds (nsfwjs probabilities, 0..1). Tweak by editing here +
  # redeploying, then re-run `pnpm backfill-nsfw --reclassify` to relabel history.
  NSFW_PORN_THRESHOLD = "0.5"
  NSFW_SEXY_THRESHOLD = "0.6"
  # Secrets (set via `fly secrets set -a nuxt-fyi-scanner`):
  #   IMAGEKIT_PRIVATE_KEY
  #   SCANNER_TOKEN  (must match the daemon's secret with the same name)

[[vm]]
  size = "shared-cpu-2x"
  memory = "4gb"

[[restart]]
  policy = "always"
